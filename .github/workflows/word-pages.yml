# Build the Word add-in and publish static files to GitHub Pages.
# Live URL: https://marinaMoji.github.io/plugin/word/
name: Word add-in — GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "word/**"
      - "mapping.json"
      - "pages/**"
      - ".github/workflows/word-pages.yml"
  workflow_dispatch:

concurrency:
  group: word-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MARINAMOJI_PLUGIN_BASE: https://marinamoji.github.io/plugin/word
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: word/package-lock.json

      - name: Build Word dist
        working-directory: word
        run: |
          npm ci
          npm run build
          npm test

      - name: Assemble site
        run: |
          mkdir -p _site/word
          cp -R word/dist/. _site/word/
          cp -R pages/. _site/
          touch _site/.nojekyll
          printf '%s\n' "$MARINAMOJI_PLUGIN_BASE/taskpane.html" > _site/word/.deploy-url

      - name: Build production manifest
        run: |
          chmod +x packaging/build-word-manifest.sh
          packaging/build-word-manifest.sh _site/marinamoji-kaeriten-word.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: marinamoji-kaeriten-word-manifest
          path: _site/marinamoji-kaeriten-word.xml
          retention-days: 90
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Requires Pages enabled once: Settings → Pages → Source → GitHub Actions
    # (or: gh api -X POST repos/marinaMoji/plugin/pages -f build_type=workflow)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
